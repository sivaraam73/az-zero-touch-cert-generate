name: CSR Certificate Request

on:
  pull_request:
    paths:
      - 'csrs/**.csr'
  push:
    branches: [main]
    paths:
      - 'csrs/**.csr'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ALLOWED_DOMAINS: "no-face.co,no-face.video"
  FUNCTION_URL: "https://func-cert-auto-siva.azurewebsites.net/api/issue-from-csr"

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed CSR files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: csrs/**.csr

      - name: Validate CSR domains and format
        run: |
          set -euo pipefail
          IFS=',' read -ra ALLOWED <<< "$ALLOWED_DOMAINS"
          for f in ${{ steps.files.outputs.all_changed_files }}; do
            echo "Validating $f"
            cn=$(openssl req -in "$f" -noout -subject | sed -n 's/.*CN *= *\([^,/]*\).*/\1/p')
            sans=$(openssl req -in "$f" -noout -text | grep -A1 "Subject Alternative Name" | tail -1 | tr ',' '\n' | sed 's/DNS://g; s/^ *//' || true)
            all_names="$cn"$'\n'"$sans"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              matched=false
              for domain in "${ALLOWED[@]}"; do
                if [[ "$name" == "$domain" || "$name" == *".$domain" ]]; then
                  matched=true; break
                fi
              done
              if [ "$matched" = false ]; then
                echo "::error::Domain '$name' in $f is not in the allowed list ($ALLOWED_DOMAINS)"
                exit 1
              fi
            done <<< "$all_names"
            echo "OK: $f (CN=$cn)"
          done

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}';
            const body = outcome === 'success'
              ? '✅ CSR validation passed — domain(s) are within the allowed list. Merge to trigger issuance.'
              : '❌ CSR validation failed — check the workflow run logs.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  issue:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find CSR files changed in this push
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: csrs/**.csr

      - name: Azure login (OIDC, no secret)
        if: steps.files.outputs.any_changed == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Request certificate for each CSR
        if: steps.files.outputs.any_changed == 'true'
        env:
          AZURE_FUNCTION_APP_ID_URI: ${{ secrets.AZURE_FUNCTION_APP_ID_URI }}
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource "$AZURE_FUNCTION_APP_ID_URI" --query accessToken -o tsv)
          for f in ${{ steps.files.outputs.all_changed_files }}; do
            name=$(basename "$f" .csr)
            echo "Requesting certificate for $name"
            csr_b64=$(base64 -w0 "$f")
            response=$(curl -sS -w "\n%{http_code}" -X POST "$FUNCTION_URL" \
              -H "Authorization: Bearer $token" \
              -H "Content-Type: application/json" \
              -d "{\"certificateName\":\"$name\",\"csr\":\"$csr_b64\"}")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')
            echo "$body"
            if [ "$http_code" != "200" ]; then
              echo "::error::Issuance failed for $name (HTTP $http_code)"
              exit 1
            fi
          done

      - name: Find PR associated with this commit
        if: steps.files.outputs.any_changed == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            return prs.data[0]?.number ?? null;

      - name: Comment issuance result on PR
        if: steps.files.outputs.any_changed == 'true' && steps.pr.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.result }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔐 Certificate issued and stored in Key Vault.'
            });
